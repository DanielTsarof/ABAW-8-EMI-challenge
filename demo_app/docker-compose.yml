services:
  emi-demo:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # App code — mounted so edits on host take effect without rebuild (--reload picks them up)
      - ./app:/app/app
      - ./frontend:/app/frontend
      # Model weights — read-only, paths in .env must resolve inside the container
      - /home/danila/master_of_cv/DIPLOM/ABAW-8-EMI-challenge/ipynb_new/weights:/home/danila/networks/data/runs:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
